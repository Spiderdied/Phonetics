// ---- AUDIO ENGINE ----
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type='sine', vol=0.08, detune=0) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq; o.detune.value = detune;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function playDroneNote(freq, dur) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    const filt = ac.createBiquadFilter();
    o.connect(filt); filt.connect(g); g.connect(ac.destination);
    filt.type = 'lowpass'; filt.frequency.value = 400;
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.04, ac.currentTime + 0.5);
    g.gain.linearRampToValueAtTime(0.04, ac.currentTime + dur - 0.5);
    g.gain.linearRampToValueAtTime(0, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function playCorrect() {
  playTone(440, 0.15, 'sine', 0.12);

}

}

}

  playTone(80+Math.random()*40, 1.5+Math.random(), 'sine', 0.015, (Math.random()-0.5)*20);
}

// Atmospheric drone

  function loopDrone() {
    const notes = [55, 65.4, 49, 73.4];
    const n = notes[Math.floor(Math.random()*notes.length)];
    playDroneNote(n, 8 + Math.random()*4);
    setTimeout(loopDrone, (8+Math.random()*6)*1000);
  }
  loopDrone();
  setInterval(()=>{ if(Math.random()<0.3) playWhisper(); }, 4000);

// ---- PARTICLES ----
function spawnParticles(x, y, col, count=8, spread=40) {
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*spread*0.1,
      vy: -Math.random()*2.5-0.5,
      life: 1, decay: 0.02+Math.random()*0.03,
      size: 2+Math.random()*5,
      color: col
    });
  }
}
function spawnIpaParticle(x, y) {
  const sym = IPA_SYMBOLS[Math.floor(Math.random()*IPA_SYMBOLS.length)];
  particles.push({
    x, y, vx:(Math.random()-0.5)*1.5, vy:-1-Math.random()*2,
    life:1, decay:0.008+Math.random()*0.01,
    size:14+Math.random()*10,
    color:'#00e5ff', text:sym
  });
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.04;
    p.life -= p.decay;
    return p.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life * 0.9;
    if(p.text) {
      ctx.font = `${p.size}px 'Courier New'`;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 15; ctx.shadowColor = p.color;
      ctx.fillText(p.text, p.x - camX, p.y - camY);
    } else {
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 8; ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x-camX, p.y-camY, p.size*p.life, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

// ---- PLATFORM COLORS ----
function getPlatformColor(type) {
  switch(type) {
    case 'ground': return { fill:'#0a0a12', stroke:'#1a1a2e' };
    case 'floor2': return { fill:'#080c1a', stroke:'#1a2040' };
    case 'floor3': return { fill:'#0a0818', stroke:'#1a1030' };
    case 'floor4': return { fill:'#050e18', stroke:'#0a2040' };
    case 'floor5': return { fill:'#080a18', stroke:'#141828' };
    case 'floor6': return { fill:'#060810', stroke:'#101520' };
    case 'floor7': return { fill:'#040408', stroke:'#0a0a18' };
    case 'stress': return { fill:'#0d0620', stroke:'#6600cc44', glow:'#6600cc' };
    case 'ipa': return { fill:'#001820', stroke:'#00e5ff44', glow:'#00e5ff' };
    case 'syll': return { fill:'#001a10', stroke:'#00cc6644', glow:'#00cc66' };
    case 'echo': return { fill:'#1a0a00', stroke:'#ff660044', glow:'#ff6600' };
    case 'final': return { fill:'#1a0000', stroke:'#ff003355', glow:'#ff0033' };
    case 'moving': return { fill:'#0d1020', stroke:'#00e5ff55', glow:'#00e5ff' };
    default: return { fill:'#080810', stroke:'#1a1a2a' };
  }
}

// ---- DRAW WORLD ----
function drawBackground() {
  // Deep dark gradient based on camera Y
  const skyFrac = Math.max(0, Math.min(1, (camY - 0) / worldH));
  const r = Math.floor(skyFrac * 2);
  const g = Math.floor(skyFrac * 3);
  const b = Math.floor(8 + skyFrac * 15);
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, W, H);

  // Far background columns/architecture
  ctx.save();
  ctx.globalAlpha = 0.07;
  for(let c=0;c<8;c++) {
    const cx = (c*(worldW/7) - camX*0.05 + worldW*10) % (W+200) - 100;
    const colH = 300 + Math.sin(c*1.3)*100;
    ctx.fillStyle = '#002233';
    ctx.fillRect(cx-20, H-colH, 40, colH);
  }
  ctx.restore();

  // Fog layers
  drawFog();
}

function drawFog() {
  ctx.save();
  ctx.globalAlpha = 0.06;
  for(let f=0;f<4;f++){
    const fogX = ((-camX * (0.02+f*0.01) + animFrame*(0.2+f*0.1)) % (W+400)) - 200;
    const grad = ctx.createRadialGradient(fogX+W/2, H/2, 50, fogX+W/2, H/2, 400);
    grad.addColorStop(0, '#00e5ff');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}

function drawFloatingLetters() {
  floatingLetters.forEach(fl => {
    const sx = fl.x - camX;
    const sy = fl.y - camY + Math.sin(animFrame*0.02*fl.speed + fl.phase)*fl.amp;
    if(sx < -50 || sx > W+50 || sy < -50 || sy > H+50) return;
    ctx.save();
    ctx.globalAlpha = fl.opacity * (fl.glowing ? (0.7+0.3*Math.sin(animFrame*0.05)) : 1);
    ctx.font = `${fl.size}px 'Courier New'`;
    ctx.fillStyle = fl.glowing ? '#00e5ff' : '#ffffff';
    if(fl.glowing) { ctx.shadowBlur = 20; ctx.shadowColor = '#00e5ff'; }
    ctx.fillText(fl.sym, sx, sy);
    ctx.restore();
  });
}

function drawPlatforms() {
  const allPlats = [...platforms, ...movingPlatforms];
  allPlats.forEach(p => {
    const sx = p.x - camX, sy = p.y - camY;
    if(sx+p.w < 0 || sx > W || sy+p.h < 0 || sy > H) return;
    const col = getPlatformColor(p.type);
    ctx.save();
    if(col.glow) {
      ctx.shadowBlur = 12; ctx.shadowColor = col.glow;
    }
    ctx.fillStyle = col.fill;
    ctx.fillRect(sx, sy, p.w, p.h);
    ctx.strokeStyle = col.stroke;
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, p.w, p.h);

    // Stress platform pulse effect
    if(p.type==='stress') {
      ctx.globalAlpha = 0.3 + 0.2*Math.sin(animFrame*0.08);
      ctx.fillStyle = '#6600cc';
      ctx.fillRect(sx, sy, p.w, 2);
    }
    if(p.type==='ipa') {
      ctx.globalAlpha = 0.3 + 0.2*Math.sin(animFrame*0.06+1);
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(sx, sy, p.w, 2);
    }
    if(p.type==='moving') {
      ctx.globalAlpha = 0.4+0.2*Math.sin(animFrame*0.1);
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(sx, sy, p.w, 2);
    }
    ctx.restore();
  });
}

function drawDoors() {
  doors.forEach(d => {
    const sx = d.x - camX, sy = d.y - camY;
    if(sx+d.w < -20 || sx > W+20 || sy+d.h < -20 || sy > H+20) return;
    ctx.save();
    if(!d.solved) {
      const glow = 0.7 + 0.3*Math.sin(animFrame*0.07);
      ctx.shadowBlur = 20*glow; ctx.shadowColor = '#00e5ff';
      ctx.strokeStyle = `rgba(0,229,255,${glow*0.8})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(sx, sy, d.w, d.h);
      ctx.fillStyle = '#001020';
      ctx.fillRect(sx+2, sy+2, d.w-4, d.h-4);
      // Door glyph
      ctx.fillStyle = `rgba(0,229,255,${glow*0.6})`;
      ctx.font = `16px 'Courier New'`;
      ctx.textAlign = 'center';
      ctx.fillText('▣', sx+d.w/2, sy+d.h/2+6);
      ctx.font = `7px 'Courier New'`;
      ctx.fillStyle = '#00e5ff88';
      ctx.fillText(d.label, sx+d.w/2, sy+d.h+14);
    } else {
      ctx.strokeStyle = '#00ff4422';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, sy, d.w, d.h);
      ctx.fillStyle = '#001a08';
      ctx.fillRect(sx+2, sy+2, d.w-4, d.h-4);
      ctx.fillStyle = '#00ff4455';
      ctx.font = `14px 'Courier New'`;
      ctx.textAlign = 'center';
      ctx.fillText('✓', sx+d.w/2, sy+d.h/2+5);
    }
    ctx.restore();
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    if(!e.alive) return;
    const sx = e.x - camX, sy = e.y - camY;
    if(sx < -100 || sx > W+100 || sy < -100 || sy > H+100) return;
    ctx.save();
    e.frame = (e.frame + 0.08) % (Math.PI*2);
    const wobble = Math.sin(e.frame*3)*3;
    const flicker = 0.6 + 0.4*Math.sin(e.frame*7);

    if(e.type==='shadow') {
      ctx.globalAlpha = flicker*0.85;
      ctx.shadowBlur = 15; ctx.shadowColor = '#000044';
      ctx.fillStyle = '#0a0a18';
      ctx.beginPath();
      ctx.ellipse(sx+e.w/2, sy+e.h/2+wobble, e.w/2, e.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      // glowing eyes
      ctx.fillStyle = `rgba(0,229,255,${flicker})`;
      ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(sx+10, sy+16, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+26, sy+16, 3, 0, Math.PI*2); ctx.fill();
      // broken IPA above
      if(Math.random()<0.02) spawnIpaParticle(e.x+e.w/2, e.y);
    } else if(e.type==='glitch') {
      ctx.globalAlpha = flicker*0.9;
      // Glitch body
      for(let g=0;g<3;g++){
        ctx.fillStyle = g===0?'#110011':g===1?'#001122':'#221100';
        ctx.fillRect(sx+Math.sin(e.frame*5+g)*4, sy+g*14, e.w, e.h/3);
      }
      ctx.fillStyle = `rgba(255,0,50,${flicker*0.7})`;
      ctx.shadowColor='#ff0033'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(sx+8, sy+15, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+28, sy+15, 4, 0, Math.PI*2); ctx.fill();
    } else { // phoneme
      ctx.globalAlpha = flicker*0.75;
      ctx.fillStyle = '#050510';
      ctx.beginPath();
      ctx.arc(sx+e.w/2, sy+e.h/2+wobble, e.w/2, 0, Math.PI*2);
      ctx.fill();
      const sym = IPA_SYMBOLS[Math.floor(e.frame*2)%IPA_SYMBOLS.length];
      ctx.font = `bold 14px 'Courier New'`;
      ctx.fillStyle = `rgba(180,0,255,${flicker})`;
      ctx.shadowColor='#8800ff'; ctx.shadowBlur=15;
      ctx.textAlign='center';
      ctx.fillText(sym, sx+e.w/2, sy+e.h/2+5+wobble);
    }
    ctx.restore();
  });
}

function drawPlayer() {
  ctx.save();
  const sx = player.x - camX, sy = player.y - camY;
  const crouchH = player.crouching ? 0.6 : 1;

  // Shadow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(sx+player.w/2, sy+player.h*crouchH+2, player.w*0.4, 4, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.globalAlpha = player.invincible > 0 ? (0.4+0.6*Math.sin(animFrame*0.3)) : 1;

  // Body silhouette
  if(player.dashing) {
    ctx.shadowBlur = 30; ctx.shadowColor = '#00e5ff';
    ctx.fillStyle = '#00e5ff';
  } else if(player.glowing) {
    ctx.shadowBlur = 20; ctx.shadowColor = '#00e5ff88';
    ctx.fillStyle = '#d0eeff';
  } else {
    ctx.fillStyle = '#e8e8f0';
  }

  const bodyH = player.h * crouchH;
  // Legs (walk anim)
  const legSwing = player.onGround ? Math.sin(player.walkFrame*0.3)*8 : 0;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(sx+6, sy+bodyH-14, 8, 14);
  ctx.fillRect(sx+player.w-14, sy+bodyH-14, 8, 14);

  // Body
  if(player.dashing) ctx.fillStyle = '#00e5ff';
  else if(player.glowing) ctx.fillStyle = '#b0d8ef';
  else ctx.fillStyle = '#c8c8d8';
  ctx.fillRect(sx+2, sy+4, player.w-4, bodyH-16);

  // Head
  ctx.fillStyle = '#e8e8f0';
  ctx.beginPath();
  ctx.arc(sx+player.w/2, sy+10, 11, 0, Math.PI*2);
  ctx.fill();

  // Eyes glow cyan
  ctx.fillStyle = '#00e5ff';
  ctx.shadowBlur = 8; ctx.shadowColor = '#00e5ff';
  ctx.beginPath();
  ctx.arc(sx+player.w/2+(player.facing*3)-2, sy+9, 2.5, 0, Math.PI*2);
  ctx.fill();
  if(player.facing>0) {
    ctx.beginPath(); ctx.arc(sx+player.w/2+5, sy+9, 2.5, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(sx+player.w/2-5, sy+9, 2.5, 0, Math.PI*2); ctx.fill();
  }

  // Dash trail
  if(player.dashing) {
    for(let t=1;t<=4;t++){
      ctx.globalAlpha = (0.1+t*0.05) * 0.7;
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(sx - player.facing*t*12, sy+4, player.w-4, bodyH-16);
    }
  }
  ctx.restore();
}

function clamp(min,v,max){return Math.max(min,Math.min(max,v));}

// ---- PHYSICS & COLLISION ----
function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function resolvePlayerPlatform(p) {
  const px = p.x, py = p.y;
  if(!rectOverlap(player.x, player.y, player.w, player.h, px, py, p.w, p.h)) return false;
  const overlapX = Math.min(player.x+player.w,px+p.w) - Math.max(player.x,px);
  const overlapY = Math.min(player.y+player.h,py+p.h) - Math.max(player.y,py);
  if(overlapX < overlapY) {
    if(player.x < px) { player.x = px - player.w; player.vx = 0; }
    else { player.x = px + p.w; player.vx = 0; }
  } else {
    if(player.vy > 0) {
      player.y = py - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumps = player.maxJumps;
    } else if(player.vy < 0) {
      player.y = py + p.h;
      player.vy = 0;
    }
  }
  return true;
}

function updateMovingPlatforms() {
  movingPlatforms.forEach(mp => {
    mp.x += mp.dx;
    if(Math.abs(mp.x - mp.ox) > mp.range) mp.dx *= -1;
    // Carry player
    if(rectOverlap(player.x, player.y+player.h-4, player.w, 6, mp.x, mp.y, mp.w, mp.h)) {
      player.x += mp.dx;
    }
  });
}

function updateEnemies() {
  enemies.forEach(e => {
    if(!e.alive) return;
    e.x += e.vx;
    // bounce off platforms
    let onFloor = false;
    [...platforms, ...movingPlatforms].forEach(p => {
      if(e.x+e.w > p.x && e.x < p.x+p.w && e.y+e.h >= p.y && e.y+e.h <= p.y+p.h+5) {
        onFloor = true;
      }
      if(e.x < p.x && e.x+e.w > p.x) e.vx = Math.abs(e.vx);
      if(e.x+e.w > p.x+p.w && e.x < p.x+p.w) e.vx = -Math.abs(e.vx);
    });
    if(e.x < 0) e.vx = Math.abs(e.vx);
    if(e.x+e.w > worldW) e.vx = -Math.abs(e.vx);

    // Touch player
    if(player.invincible <= 0 && rectOverlap(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)) {
      player.invincible = 90;
      stressLevel = Math.min(100, stressLevel + 20);
      camShake = 10;
      spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ff3333', 12);
      playTone(150, 0.3, 'sawtooth', 0.1);
    }

    // Player stomps enemy
    if(player.vy > 0 &&
       player.y+player.h > e.y && player.y+player.h < e.y+e.h*0.4 &&
       player.x+player.w > e.x+4 && player.x < e.x+e.w-4) {
      e.alive = false;
      spawnParticles(e.x+e.w/2, e.y+e.h/2, '#00e5ff', 16);
      spawnIpaParticle(e.x+e.w/2, e.y);
      player.vy = -8;
      playTone(220, 0.15, 'square', 0.09);
      stressLevel = Math.max(0, stressLevel - 5);
    }
  });
}

let nearDoor = null;
function checkDoorProximity() {
  nearDoor = null;
  let prompt = '';
  doors.forEach(d => {
    if(!d.solved && rectOverlap(player.x-30, player.y-10, player.w+60, player.h+20, d.x, d.y, d.w, d.h)) {
      nearDoor = d;
      prompt = `[E / TAP] ${d.label}`;
    }
  });
  const pb = document.getElementById('prompt-box');
  const pt = document.getElementById('prompt-text');
  if(nearDoor) {
    pb.style.display = 'block';
    pt.textContent = prompt;
  } else {
    pb.style.display = 'none';
  }
}

function updateCamera() {
  const targetX = player.x - W/2 + player.w/2;
  const targetY = player.y - H/2;
  camTargetX = clamp(0, targetX, worldW - W);
  camTargetY = clamp(0, targetY, worldH - H);
  camX += (camTargetX - camX) * 0.08;
  camY += (camTargetY - camY) * 0.08;
  if(camShake > 0) {
    camX += (Math.random()-0.5)*camShake;
    camY += (Math.random()-0.5)*camShake;
    camShake *= 0.85;
    if(camShake < 0.5) camShake = 0;
  }
}

function updateZone() {
  triggerZones.forEach(tz => {
    if(rectOverlap(player.x,player.y,player.w,player.h,tz.x,tz.y,tz.w,tz.h)){
      if(tz.zone !== currentZone) {
        currentZone = tz.zone;
        document.getElementById('zone-label').textContent = ZONES[currentZone];
      }
    }
  });
}

// ---- PLAYER UPDATE ----
const GRAVITY = 0.5;
const MAX_FALL = 16;
const WALK_SPEED = 4.5;
const JUMP_FORCE = -13;
const DASH_SPEED = 14;

function updatePlayer(dt) {
  if(player.dead) {
    player.deathTimer--;
    if(player.deathTimer <= 0) respawn();
    return;
  }
  if(puzzleActive) return;

  player.crouching = keys['KeyS'] || keys['ArrowDown'];
  const speed = player.crouching ? WALK_SPEED*0.4 : WALK_SPEED;

  if((input.left || keys['ArrowLeft'] || keys['KeyA']) && !player.dashing) {
    player.vx = -speed; player.facing = -1;
  } else if((input.right || keys['ArrowRight'] || keys['KeyD']) && !player.dashing) {
    player.vx = speed; player.facing = 1;
  } else if(!player.dashing) {
    player.vx *= 0.75;
  }

  if(player.dashing) {
    player.dashTimer--;
    player.vx = player.facing * DASH_SPEED;
    if(player.dashTimer <= 0) { player.dashing = false; }
  }

  // Jump
  if((input.jump || keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && !player._jumpHeld) {
    player._jumpHeld = true;
    if(player.jumps > 0) {
      player.vy = JUMP_FORCE;
      player.jumps--;
      playJump();
      spawnParticles(player.x+player.w/2, player.y+player.h, '#00e5ff44', 5);
    }
  }
  if(!input.jump && !keys['Space'] && !keys['ArrowUp'] && !keys['KeyW']) {
    player._jumpHeld = false;
  }

  // Dash
  if((input.dash || keys['ShiftLeft'] || keys['ShiftRight']) && !player.dashing && player.dashCooldown <= 0) {
    player.dashing = true;
    player.dashTimer = 10;
    player.dashCooldown = 40;
    playDash();
    spawnParticles(player.x+player.w/2, player.y+player.h/2, '#00e5ff', 10);
  }
  if(player.dashCooldown > 0) player.dashCooldown--;
  if(player.invincible > 0) player.invincible--;

  player.vy = Math.min(player.vy + GRAVITY, MAX_FALL);
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;
  const allPlats = [...platforms, ...movingPlatforms];
  allPlats.forEach(p => resolvePlayerPlatform(p));

  // Walk animation
  if(player.onGround && Math.abs(player.vx) > 0.5) {
    player.walkTimer++;
    if(player.walkTimer % 8 === 0) {
      player.walkFrame++;
      playStep();
    }
  }

  // Bounds
  player.x = clamp(0, player.x, worldW - player.w);
  if(player.y > worldH + 100) die();

  // Door interact
  if((keys['KeyE'] || keys['Enter']) && nearDoor && !puzzleActive) {
    openPuzzle(nearDoor);
    keys['KeyE'] = false; keys['Enter'] = false;
  }

  // Stress decay
  stressLevel = Math.max(0, stressLevel - 0.02);
  document.getElementById('stress-bar').style.width = stressLevel + '%';

  // IPA particles from player when solving
  if(player.glowing && Math.random() < 0.05) {
    spawnIpaParticle(player.x+player.w/2, player.y);
  }
}

function die() {
  if(player.dead) return;
  player.dead = true;
  player.deathTimer = 80;
  stressLevel = Math.min(100, stressLevel + 30);
  camShake = 20;
  spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ff3333', 20);
  playTone(110, 0.5, 'sawtooth', 0.15);
  setTimeout(()=>playTone(80, 0.8, 'sine', 0.1), 300);
}

function respawn() {
  player.dead = false;
  player.x = playerSpawn.x; player.y = playerSpawn.y;
  player.vx = 0; player.vy = 0;
  player.onGround = false; player.jumps = player.maxJumps;
  player.dashing = false; player.invincible = 60;
}

// ---- PUZZLES ----
let activeDoor = null;
function openPuzzle(door) {
  if(puzzleActive) return;
  puzzleActive = true;
  activeDoor = door;
  const overlay = document.getElementById('puzzle-overlay');
  overlay.style.display = 'flex';
  
  let puzzles, idx;
  if(door.puzzleType==='stress') {
    puzzles = STRESS_PUZZLES;
    idx = door.puzzleIdx % STRESS_PUZZLES.length;
    renderStressPuzzle(puzzles[idx]);
  } else if(door.puzzleType==='ipa') {
    puzzles = IPA_DOOR_PUZZLES;
    idx = door.puzzleIdx % IPA_DOOR_PUZZLES.length;
    renderMultiPuzzle(puzzles[idx]);
  } else {
    puzzles = SYLLABLE_PUZZLES;
    idx = door.puzzleIdx % SYLLABLE_PUZZLES.length;
    renderMultiPuzzle(puzzles[idx]);
  }
}

function renderStressPuzzle(pz) {
  document.getElementById('puzzle-title').textContent = pz.topic.toUpperCase();
  document.getElementById('puzzle-inst').textContent = 
    `Choose the STRESSED syllable in: "${pz.word}"`;
  const opts = document.getElementById('puzzle-options');
  opts.innerHTML = '';
  document.getElementById('puzzle-feedback').textContent = '';
  pz.syllables.forEach((syl, i) => {
    const btn = document.createElement('button');
    btn.className = 'puzzle-btn';
    btn.innerHTML = syl;
    btn.onclick = () => handleStressAnswer(i, pz, btn);
    opts.appendChild(btn);
  });
}

function renderMultiPuzzle(pz) {
  document.getElementById('puzzle-title').textContent = pz.topic.toUpperCase();
  document.getElementById('puzzle-inst').textContent = pz.question;
  const opts = document.getElementById('puzzle-options');
  opts.innerHTML = '';
  document.getElementById('puzzle-feedback').textContent = '';
  pz.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'puzzle-btn';
    btn.textContent = opt;
    btn.onclick = () => handleMultiAnswer(i, pz, btn);
    opts.appendChild(btn);
  });
}

function handleStressAnswer(chosen, pz, btn) {
  const fb = document.getElementById('puzzle-feedback');
  if(chosen === pz.answer) {
    fb.textContent = `✓ Correct! ${pz.hint}`;
    fb.className = 'puzzle-feedback feedback-correct';
    btn.classList.add('active');
    playCorrect();
    setTimeout(()=>closePuzzle(true), 1200);
  } else {
    fb.textContent = `✗ Wrong. ${pz.hint}`;
    fb.className = 'puzzle-feedback feedback-wrong';
    playWrong();
    stressLevel = Math.min(100, stressLevel + 10);
    btn.style.borderColor = '#ff333377';
  }
}

function handleMultiAnswer(chosen, pz, btn) {
  const fb = document.getElementById('puzzle-feedback');
  if(chosen === pz.answer) {
    fb.textContent = '✓ Correct! The phonetic seal breaks...';
    fb.className = 'puzzle-feedback feedback-correct';
    btn.classList.add('active');
    playCorrect();
    setTimeout(()=>closePuzzle(true), 1200);
  } else {
    fb.textContent = '✗ Wrong. The tower resists...';
    fb.className = 'puzzle-feedback feedback-wrong';
    playWrong();
    stressLevel = Math.min(100, stressLevel + 12);
    btn.style.borderColor = '#ff333377';
  }
}

function closePuzzle(solved) {
  puzzleActive = false;
  document.getElementById('puzzle-overlay').style.display = 'none';
  if(solved && activeDoor) {
    activeDoor.solved = true;
    player.glowing = true;
    setTimeout(()=>player.glowing = false, 3000);
    playUnlock();
    spawnParticles(activeDoor.x+activeDoor.w/2, activeDoor.y+activeDoor.h/2, '#00e5ff', 20);
    for(let i=0;i<5;i++) setTimeout(()=>spawnIpaParticle(activeDoor.x+Math.random()*activeDoor.w, activeDoor.y), i*100);
    camShake = 6;
    stressLevel = Math.max(0, stressLevel - 15);
  }
  activeDoor = null;
}

// Mobile puzzle tap close
document.addEventListener('keydown', e => {
  if(e.code==='Escape' && puzzleActive) closePuzzle(false);
  keys[e.code] = true;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ---- MOBILE CONTROLS ----
function setupMobile() {
  const btnL = document.getElementById('btn-left');
  const btnR = document.getElementById('btn-right');
  const btnJ = document.getElementById('btn-jump');
  const btnD = document.getElementById('btn-dash');

  btnL.addEventListener('touchstart',e=>{e.preventDefault();input.left=true;},{passive:false});
  btnL.addEventListener('touchend',e=>{e.preventDefault();input.left=false;},{passive:false});
  btnR.addEventListener('touchstart',e=>{e.preventDefault();input.right=true;},{passive:false});
  btnR.addEventListener('touchend',e=>{e.preventDefault();input.right=false;},{passive:false});
  btnJ.addEventListener('touchstart',e=>{e.preventDefault();input.jump=true;},{passive:false});
  btnJ.addEventListener('touchend',e=>{e.preventDefault();input.jump=false;},{passive:false});
  btnD.addEventListener('touchstart',e=>{e.preventDefault();input.dash=true;},{passive:false});
  btnD.addEventListener('touchend',e=>{e.preventDefault();input.dash=false;},{passive:false});

  // Tap door on mobile
  canvas.addEventListener('touchstart', e=>{
    if(nearDoor && !puzzleActive) {
      const t = e.touches[0];
      const dx = t.clientX - (nearDoor.x - camX + nearDoor.w/2);
      const dy = t.clientY - (nearDoor.y - camY + nearDoor.h/2);
      if(Math.sqrt(dx*dx+dy*dy) < 100) openPuzzle(nearDoor);
    }
  },{passive:true});
}

// ---- MAIN RENDER ----
function drawCinematicBars() {
  const barH = Math.floor(H * 0.06);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, barH);
  ctx.fillRect(0, H-barH, W, barH);
}

function drawVignetteOverlay() {
  const grad = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.85);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,0.65)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawDeathOverlay() {
  if(!player.dead) return;
  ctx.save();
  const frac = 1 - player.deathTimer/80;
  ctx.fillStyle = `rgba(20,0,0,${frac*0.7})`;
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = frac;
  ctx.font = `${clamp(16,3*(W/800),36)}px 'Georgia'`;
  ctx.fillStyle = '#ff3333';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000';
  ctx.fillText('STRESS OVERWHELMS', W/2, H/2);
  ctx.font = `${clamp(10,1.5*(W/800),18)}px 'Courier New'`;
  ctx.fillStyle = '#ff333377';
  ctx.fillText('returning to last position...', W/2, H/2+40);
  ctx.restore();
}

// ---- LOOP ----
function gameLoop(ts) {
  if(!gameRunning) return;
  const dt = Math.min((ts - lastTime)/16, 3);
  lastTime = ts;
  animFrame++;

  // Ambient IPA particles
  if(Math.random() < 0.015) spawnIpaParticle(
    camX + Math.random()*W, camY + Math.random()*H
  );

  updateMovingPlatforms();
  updatePlayer(dt);
  updateEnemies();
  updateParticles();
  updateCamera();
  updateZone();
  checkDoorProximity();

  // --- DRAW ---
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawZoneSignage();
  drawFloatingLetters();
  drawPlatforms();
  drawDoors();
  drawEnemies();
  drawParticles();
  drawPlayer();
  drawVignetteOverlay();
  drawCinematicBars();
  drawDeathOverlay();

  requestAnimationFrame(gameLoop);
}

// ---- TITLE SCREEN ----
function startGame() {
  const ts = document.getElementById('title-screen');
  ts.style.transition = 'opacity 1.5s';
  ts.style.opacity = '0';
  setTimeout(()=>{ ts.style.display='none'; }, 1500);
  gameRunning = true;
  getAudio(); // unlock audio context
  startAmbience();
  buildWorld();
  player.x = playerSpawn.x;
  player.y = playerSpawn.y;
  setupMobile();
  requestAnimationFrame(t=>{ lastTime=t; gameLoop(t); });
}

document.getElementById('title-screen').addEventListener('click', startGame);
document.getElementById('title-screen').addEventListener('touchstart', e=>{
  e.preventDefault(); startGame();
},{passive:false});
</script>
